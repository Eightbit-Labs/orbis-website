<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background rounded square -->
  <rect width="200" height="200" rx="40" fill="url(#bg)" />

  <!-- Icon: center hub + 4 satellites -->
  <circle cx="100" cy="100" r="22" fill="white" />
  <circle cx="100" cy="36"  r="13" fill="white" opacity="0.6" />
  <circle cx="100" cy="164" r="13" fill="white" opacity="0.6" />
  <circle cx="36"  cy="100" r="13" fill="white" opacity="0.6" />
  <circle cx="164" cy="100" r="13" fill="white" opacity="0.6" />

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#2563eb" />
      <stop offset="100%" stop-color="#93c5fd" />
    </linearGradient>
  </defs>
</svg>
